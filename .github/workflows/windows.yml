name: Windows-CI
permissions: { }

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

env:
  CARGO_TERM_COLOR: always
  VCPKG_ROOT: C:\vcpkg

jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - name: Install lib dependencies (vcpkg)
        run: vcpkg install --triplet=x64-windows-static-md mimalloc
      - name: Cargo build
        run: cargo build -vv
      - name: Cargo clippy
        run: cargo clippy
